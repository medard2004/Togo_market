name: togo_market
description: Togo Market - Le Marché Local de Lomé
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation & State Management
  get: ^4.6.6

  # UI & Animations
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  animated_bottom_navigation_bar: ^1.3.3
  flutter_staggered_animations: ^1.1.1

  # Images & Media
  image_picker: ^1.0.7

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Toast & Notifications
  fluttertoast: ^8.2.4

  # Icons
  phosphor_flutter: ^2.0.1

  # Utilities
  intl: ^0.19.0
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.1.0

  # Chat
  dash_chat_2: ^0.0.21

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
